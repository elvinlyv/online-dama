<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aliyev Dama</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #f5f5f5;
            overflow-x: hidden;
        }

        body {
            background:
                radial-gradient(circle at top, rgba(176, 124, 73, 0.18), transparent 35%),
                linear-gradient(135deg, #111 0%, #17120f 35%, #231a14 100%);
        }

        .landing-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 24px;
            overflow: hidden;
        }

        .landing-screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 70px 70px;
            opacity: 0.28;
            pointer-events: none;
        }

        .landing-screen::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03), transparent 20%);
            pointer-events: none;
        }

        .landing-card {
            position: relative;
            z-index: 2;
            width: min(900px, 96vw);
            padding: 40px 30px;
            border-radius: 28px;
            background: rgba(13, 13, 13, 0.82);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
            backdrop-filter: blur(8px);
            text-align: center;
        }

        .landing-title {
            font-size: clamp(42px, 7vw, 88px);
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0 0 12px;
            color: #f2dec2;
            text-shadow: 0 6px 30px rgba(0,0,0,0.35);
        }

        .landing-subtitle {
            margin: 0 0 30px;
            font-size: clamp(16px, 2vw, 22px);
            color: #d2c1a7;
        }

        .hero-pieces {
            display: flex;
            justify-content: center;
            gap: 26px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .hero-piece {
            width: 74px;
            height: 74px;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.12);
        }

        .hero-piece.red {
            background: linear-gradient(145deg, #d11f1f, #7d0d0d);
        }

        .hero-piece.black {
            background: linear-gradient(145deg, #333, #080808);
        }

        .join-panel {
            max-width: 520px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .join-panel input {
            flex: 1;
            min-width: 240px;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: white;
            font-size: 16px;
            outline: none;
        }

        .join-panel input::placeholder {
            color: #b8b8b8;
        }

        .join-panel button,
        .game-btn,
        .chat-input-row button {
            padding: 14px 18px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            color: #111;
            background: linear-gradient(135deg, #f3d59b, #c98d45);
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .join-panel button:hover,
        .game-btn:hover,
        .chat-input-row button:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        .signature {
            position: fixed;
            right: 14px;
            bottom: 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            z-index: 999;
            user-select: none;
            letter-spacing: 0.4px;
        }

        .game-screen {
            display: none;
            min-height: 100vh;
            padding: 24px 18px 28px;
        }

        .game-screen.active {
            display: block;
        }

        .topbar {
            max-width: 1380px;
            margin: 0 auto 18px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .topbar-left h1 {
            margin: 0 0 6px;
            font-size: 32px;
            color: #f2dec2;
        }

        .info-line {
            font-size: 15px;
            color: #ddd;
            margin: 4px 0;
        }

        .topbar-right {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .main-layout {
            max-width: 1380px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(320px, 1fr) 270px;
            gap: 20px;
            align-items: start;
        }

        .board-card,
        .chat-card {
            background: rgba(13, 13, 13, 0.84);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
            backdrop-filter: blur(10px);
        }

        .board-wrap {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 72px);
            grid-template-rows: repeat(8, 72px);
            border: 6px solid #3b2413;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(0,0,0,0.35);
        }

        .cell {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .light {
            background: #e5c79d;
        }

        .dark {
            background: #8b5a2b;
        }

        .selected {
            outline: 4px solid #ffe66a;
            outline-offset: -4px;
        }

        .hint::after {
            content: "";
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(111, 255, 123, 0.8);
            position: absolute;
            box-shadow: 0 0 18px rgba(111, 255, 123, 0.8);
        }

        .piece {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 4px 10px rgba(255,255,255,0.12), 0 5px 14px rgba(0,0,0,0.35);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .red-piece {
            background: radial-gradient(circle at 30% 30%, #ff5b5b, #b91515 60%, #6f0c0c 100%);
        }

        .black-piece {
            background: radial-gradient(circle at 30% 30%, #5e5e5e, #1f1f1f 55%, #080808 100%);
        }

        .king::after {
            content: "K";
            color: #fff3c8;
            font-size: 22px;
            font-weight: 900;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .chat-title {
            margin: 0 0 12px;
            color: #f2dec2;
            font-size: 20px;
        }

        #chatMessages {
            height: 480px;
            overflow-y: auto;
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .chat-message {
            margin-bottom: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #ececec;
            word-wrap: break-word;
        }

        .chat-message strong {
            color: #f3d59b;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }

        #chatInput {
            flex: 1;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }

        .result-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.78);
            z-index: 1000;
            backdrop-filter: blur(6px);
        }

        .result-overlay.show {
            display: flex;
            animation: fadeIn 0.35s ease;
        }

        .result-text {
            font-size: clamp(54px, 10vw, 120px);
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        .result-text.win {
            color: #6cff86;
        }

        .result-text.lose {
            color: #ff6767;
        }

        .result-text.draw {
            color: #ffe27a;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 1100px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .chat-card {
                order: 2;
            }

            .board-card {
                order: 1;
            }

            #chatMessages {
                height: 240px;
            }
        }

        @media (max-width: 700px) {
            #board {
                grid-template-columns: repeat(8, 42px);
                grid-template-rows: repeat(8, 42px);
            }

            .cell {
                width: 42px;
                height: 42px;
            }

            .piece {
                width: 32px;
                height: 32px;
            }

            .topbar-left h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="landingScreen" class="landing-screen">
        <div class="landing-card">
            <div class="hero-pieces">
                <div class="hero-piece red"></div>
                <div class="hero-piece black"></div>
                <div class="hero-piece red"></div>
            </div>

            <h1 class="landing-title">DAMA</h1>
            <p class="landing-subtitle">Rakibini bul, odaya katıl ve maça başla.</p>

            <div class="join-panel">
                <input type="text" id="roomInput" placeholder="Oda kodunu gir" />
                <button id="joinBtn">Oyuna Katıl</button>
            </div>
        </div>
    </div>

    <div id="gameScreen" class="game-screen">
        <div class="topbar">
            <div class="topbar-left">
                <h1>Online Dama</h1>
                <div id="roomInfo" class="info-line">Oda: -</div>
                <div id="playerInfo" class="info-line">Oyuncu rengi atanıyor...</div>
                <div id="status" class="info-line">Bağlanıyor...</div>
            </div>

            <div class="topbar-right">
                <button id="resetBtn" class="game-btn">Yeni Oyun</button>
                <button id="leaveBtn" class="game-btn">Çıkış</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="board-card">
                <div class="board-wrap">
                    <div id="board"></div>
                </div>
            </div>

            <div class="chat-card">
                <h3 class="chat-title">Sohbet</h3>
                <div id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Mesaj yaz..." maxlength="200" />
                    <button id="sendChatBtn">Gönder</button>
                </div>
            </div>
        </div>
    </div>

    <div id="resultOverlay" class="result-overlay">
        <div id="resultText" class="result-text">WIN</div>
    </div>

    <div class="signature">Abidin Hüseynzade</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script>
        const board = document.getElementById("board");
        const statusText = document.getElementById("status");
        const playerInfo = document.getElementById("playerInfo");
        const roomInfo = document.getElementById("roomInfo");
        const roomInput = document.getElementById("roomInput");
        const joinBtn = document.getElementById("joinBtn");
        const resetBtn = document.getElementById("resetBtn");
        const leaveBtn = document.getElementById("leaveBtn");

        const landingScreen = document.getElementById("landingScreen");
        const gameScreen = document.getElementById("gameScreen");

        const chatMessages = document.getElementById("chatMessages");
        const chatInput = document.getElementById("chatInput");
        const sendChatBtn = document.getElementById("sendChatBtn");

        const resultOverlay = document.getElementById("resultOverlay");
        const resultText = document.getElementById("resultText");

        let myColor = "spectator";
        let selectedPiece = null;
        let gameState = null;
        let currentRoomId = null;
        let isJoined = false;
        let shownGameResult = false;

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/gamehub")
            .build();

        connection.on("PlayerAssigned", (color) => {
            myColor = color;

            if (color === "r") {
                playerInfo.textContent = "Sen kırmızı taşsın";
            } else if (color === "b") {
                playerInfo.textContent = "Sen siyah taşsın";
            } else {
                playerInfo.textContent = "Sen izleyicisin";
            }

            updateStatus();
        });

        connection.on("GameStarted", () => {
            updateStatus("Oyun başladı");
            addSystemMessage("Oyun başladı.");
        });

        connection.on("ReceiveState", (state) => {
            const wasGameOver = gameState ? gameState.gameOver : false;

            gameState = state;
            selectedPiece = null;
            updateStatus();
            drawBoard();

            if (!wasGameOver && gameState.gameOver && !shownGameResult) {
                showResult();
            }

            if (!gameState.gameOver) {
                shownGameResult = false;
            }
        });

        connection.on("InvalidMove", () => {
            updateStatus("Geçersiz hamle");
        });

        connection.on("PlayerDisconnected", () => {
            updateStatus("Bir oyuncu ayrıldı");
            addSystemMessage("Rakip bağlantıdan çıktı.");
        });

        connection.on("ReceiveChatMessage", (sender, message) => {
            addChatMessage(sender, message);
        });

        connection.start()
            .then(() => {
                statusText.textContent = "Bağlandı. Oda kodunu gir.";
            })
            .catch(err => {
                console.error(err);
                statusText.textContent = "Bağlantı hatası";
            });

        joinBtn.addEventListener("click", joinRoom);

        roomInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                joinRoom();
            }
        });

        resetBtn.addEventListener("click", function () {
            if (!currentRoomId) {
                updateStatus("Önce bir odaya katıl");
                return;
            }

            connection.invoke("ResetGame", currentRoomId)
                .then(() => {
                    addSystemMessage("Oyun sıfırlandı.");
                })
                .catch(err => {
                    console.error(err.toString());
                    updateStatus("Yeni oyun başlatma hatası");
                });
        });

        leaveBtn.addEventListener("click", function () {
            location.reload();
        });

        sendChatBtn.addEventListener("click", sendChat);
        chatInput.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                sendChat();
            }
        });

        function joinRoom() {
            const roomId = roomInput.value.trim();

            if (roomId === "") {
                return;
            }

            currentRoomId = roomId;
            isJoined = true;
            roomInfo.textContent = "Oda: " + currentRoomId;
            statusText.textContent = "Odaya katılıyor...";
            landingScreen.style.display = "none";
            gameScreen.classList.add("active");

            connection.invoke("JoinGame", currentRoomId)
                .then(() => {
                    addSystemMessage("Odaya katıldın.");
                })
                .catch(err => {
                    console.error(err.toString());
                    updateStatus("Odaya katılma hatası");
                });
        }

        function sendChat() {
            if (!currentRoomId) return;

            const message = chatInput.value.trim();
            if (message === "") return;

            const sender =
                myColor === "r" ? "Kırmızı" :
                myColor === "b" ? "Siyah" : "İzleyici";

            connection.invoke("SendChatMessage", currentRoomId, sender, message)
                .then(() => {
                    chatInput.value = "";
                })
                .catch(err => console.error(err.toString()));
        }

        function addChatMessage(sender, message) {
            const div = document.createElement("div");
            div.className = "chat-message";
            div.innerHTML = `<strong>${escapeHtml(sender)}:</strong> ${escapeHtml(message)}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addSystemMessage(message) {
            const div = document.createElement("div");
            div.className = "chat-message";
            div.innerHTML = `<strong>Sistem:</strong> ${escapeHtml(message)}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        function showResult() {
            if (!gameState || !gameState.gameOver) return;

            shownGameResult = true;

            let text = "DRAW";
            let cls = "draw";

            if (gameState.winner === myColor) {
                text = "WIN";
                cls = "win";
            } else if (myColor !== "spectator") {
                text = "LOSE";
                cls = "lose";
            }

            resultText.textContent = text;
            resultText.className = "result-text " + cls;
            resultOverlay.classList.add("show");

            setTimeout(() => {
                resultOverlay.classList.remove("show");
            }, 3000);
        }

        function isRedPiece(piece) {
            return piece === "r" || piece === "R";
        }

        function isBlackPiece(piece) {
            return piece === "b" || piece === "B";
        }

        function isKing(piece) {
            return piece === "R" || piece === "B";
        }

        function belongsToPlayer(piece, player) {
            if (player === "r") return isRedPiece(piece);
            if (player === "b") return isBlackPiece(piece);
            return false;
        }

        function insideBoard(row, col) {
            return row >= 0 && row < 8 && col >= 0 && col < 8;
        }

        function getDirections(piece) {
            if (piece === "r") return [[-1, -1], [-1, 1]];
            if (piece === "b") return [[1, -1], [1, 1]];
            if (piece === "R" || piece === "B") {
                return [[-1, -1], [-1, 1], [1, -1], [1, 1]];
            }
            return [];
        }

        function getLegalTargets(row, col) {
            if (!gameState) return [];

            const boardData = gameState.board;
            const piece = boardData[row][col];
            const targets = [];

            if (!belongsToPlayer(piece, gameState.currentPlayer)) {
                return [];
            }

            if (
                gameState.forcedRow !== null &&
                gameState.forcedCol !== null &&
                (row !== gameState.forcedRow || col !== gameState.forcedCol)
            ) {
                return [];
            }

            let mustCapture = false;

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const p = boardData[r][c];
                    if (!belongsToPlayer(p, gameState.currentPlayer)) continue;

                    for (const [dr, dc] of getDirections(p)) {
                        const mr = r + dr;
                        const mc = c + dc;
                        const lr = r + 2 * dr;
                        const lc = c + 2 * dc;

                        if (!insideBoard(mr, mc) || !insideBoard(lr, lc)) continue;

                        const midPiece = boardData[mr][mc];
                        const landing = boardData[lr][lc];

                        if (
                            gameState.currentPlayer === "r" &&
                            isBlackPiece(midPiece) &&
                            landing === ""
                        ) {
                            mustCapture = true;
                        }

                        if (
                            gameState.currentPlayer === "b" &&
                            isRedPiece(midPiece) &&
                            landing === ""
                        ) {
                            mustCapture = true;
                        }
                    }
                }
            }

            for (const [dr, dc] of getDirections(piece)) {
                const nr = row + dr;
                const nc = col + dc;

                if (insideBoard(nr, nc) && boardData[nr][nc] === "" && !mustCapture) {
                    targets.push({ row: nr, col: nc });
                }

                const mr = row + dr;
                const mc = col + dc;
                const lr = row + 2 * dr;
                const lc = col + 2 * dc;

                if (!insideBoard(mr, mc) || !insideBoard(lr, lc)) continue;

                const midPiece = boardData[mr][mc];
                const landing = boardData[lr][lc];

                if (
                    gameState.currentPlayer === "r" &&
                    isBlackPiece(midPiece) &&
                    landing === ""
                ) {
                    targets.push({ row: lr, col: lc });
                }

                if (
                    gameState.currentPlayer === "b" &&
                    isRedPiece(midPiece) &&
                    landing === ""
                ) {
                    targets.push({ row: lr, col: lc });
                }
            }

            return targets;
        }

        function handleCellClick(row, col) {
            if (!isJoined) return;
            if (!gameState) return;
            if (gameState.gameOver) return;
            if (myColor === "spectator") return;
            if (myColor !== gameState.currentPlayer) return;

            const piece = gameState.board[row][col];

            if (selectedPiece === null) {
                if (belongsToPlayer(piece, myColor)) {
                    const legalTargets = getLegalTargets(row, col);
                    if (legalTargets.length > 0) {
                        selectedPiece = { row, col };
                        drawBoard();
                    }
                }
                return;
            }

            if (belongsToPlayer(piece, myColor)) {
                const legalTargets = getLegalTargets(row, col);
                if (legalTargets.length > 0) {
                    selectedPiece = { row, col };
                    drawBoard();
                }
                return;
            }

            const legalTargets = getLegalTargets(selectedPiece.row, selectedPiece.col);
            const validTarget = legalTargets.find(t => t.row === row && t.col === col);

            if (!validTarget) {
                return;
            }

            connection.invoke("MakeMove", currentRoomId, {
                fromRow: selectedPiece.row,
                fromCol: selectedPiece.col,
                toRow: row,
                toCol: col,
                player: myColor
            }).catch(err => console.error(err.toString()));
        }

        function updateStatus(extra = "") {
            if (!isJoined) {
                statusText.textContent = extra || "Oda kodu girip katıl.";
                return;
            }

            if (!gameState) {
                statusText.textContent = extra || "Oyun durumu bekleniyor...";
                return;
            }

            if (gameState.gameOver) {
                if (gameState.winner === "r") {
                    statusText.textContent = "Oyun bitti. Kazanan: Kırmızı";
                } else if (gameState.winner === "b") {
                    statusText.textContent = "Oyun bitti. Kazanan: Siyah";
                } else {
                    statusText.textContent = "Oyun bitti";
                }
                return;
            }

            let text = gameState.currentPlayer === "r" ? "Sıra: Kırmızı" : "Sıra: Siyah";

            if (gameState.forcedRow !== null && gameState.forcedCol !== null) {
                text += " | Aynı taşla yemeye devam et";
            }

            if (extra) {
                text += " | " + extra;
            }

            statusText.textContent = text;
        }

        function drawBoard() {
            board.innerHTML = "";

            if (!gameState) return;

            let hints = [];

            if (selectedPiece) {
                hints = getLegalTargets(selectedPiece.row, selectedPiece.col);
            }

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const cell = document.createElement("div");
                    cell.classList.add("cell");
                    cell.classList.add((row + col) % 2 === 0 ? "light" : "dark");

                    if (selectedPiece && selectedPiece.row === row && selectedPiece.col === col) {
                        cell.classList.add("selected");
                    }

                    if (hints.some(h => h.row === row && h.col === col)) {
                        cell.classList.add("hint");
                    }

                    const pieceValue = gameState.board[row][col];

                    if (pieceValue !== "") {
                        const piece = document.createElement("div");
                        piece.classList.add("piece");

                        if (isRedPiece(pieceValue)) {
                            piece.classList.add("red-piece");
                        } else {
                            piece.classList.add("black-piece");
                        }

                        if (isKing(pieceValue)) {
                            piece.classList.add("king");
                        }

                        cell.appendChild(piece);
                    }

                    cell.addEventListener("click", () => handleCellClick(row, col));
                    board.appendChild(cell);
                }
            }
        }
    </script>
</body>
</html>
